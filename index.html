<!DOCTYPE html>
<html>
<head>
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="video-bg" loop playsinline></video>
  <span>Location: <input type="text" id="location" value="pick a place"></span>
  <button onclick="sonify()">sonify</button>
  <button onclick="stopAll()">stop</button>
  <p id="info">Search for a location to see 🎥 its temperature.</p>

  <script>
    const videoBg = document.getElementById('video-bg');
    const locationField = document.getElementById('location');
    const infoField = document.getElementById('info');

    function playVideoForTemp(temp) {
      let src;
      if (temp <= 32) {
        src = 'winter_air.mp4';
      } else if (temp <= 75) {
        src = 'walking_on_sunshine.mp4';
      } else {
        src = 'omg_its_hot.mp4';
      }
      if (!videoBg.src.endsWith(src)) {
        videoBg.src = src;
        videoBg.load();
      }
      videoBg.style.display = 'block';
      videoBg.play();
    }

    function sonify() {
      fetch('https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/' + locationField.value + '?key=YH5QF5SWJL5LZ8SFPZFT2RCC2')
        .then(response => response.json())
        .then(response => {
          const temp = response.days[0].temp;
          infoField.innerHTML = "the weather in " + locationField.value + " is " + temp;
          infoField.innerHTML += temp < 60 ? " ❄️" : " ☀️";
          playVideoForTemp(temp);
        })
        .catch(err => console.error(err));
    }

    function stopAll() {
      videoBg.pause();
      videoBg.style.display = 'none';
    }
  </script>
</body>
</html>
